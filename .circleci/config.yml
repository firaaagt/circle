version: 2.1
jobs:
  masak_ksu_next:
    docker:
      - image: cimg/base:stable
    resource_class: large
    steps:
      - checkout
      - run:
          name: Setup Environment
          command: |
            sudo apt-get update
            sudo apt-get install -y bc bison build-essential flex git libssl-dev libelf-dev clang lld llvm gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi cpio
      - run:
          name: Clone Source & Submodule
          command: |
            git clone --depth=1 https://github.com/Rve27/android_kernel_xiaomi_msm8937.git -b ksu kernel
            cd kernel
            git submodule update --init --recursive
      - run:
          name: Build Kernel & DTB
          command: |
            cd kernel
            export ARCH=arm64
            export SUBARCH=arm64
            export KBUILD_BUILD_USER="Wildan"
            export KBUILD_BUILD_HOST="Kaioxen-Lab"
            mkdir -p out
            
            # Step 1: Generate Config
            make O=out ARCH=arm64 vendor/msm8937_defconfig
            
            # Step 2: Set Nama Wildan & Aktifkan Fitur
            scripts/config --file out/.config --set-str CONFIG_LOCALVERSION "-Wildan"
            scripts/config --file out/.config --enable CONFIG_KSU
            scripts/config --file out/.config --enable CONFIG_KSU_NEXT
            scripts/config --file out/.config --disable CONFIG_FAULT_INJECTION
            scripts/config --file out/.config --disable CONFIG_IKHEADERS
            scripts/config --file out/.config --disable CONFIG_BPF_PRELOAD
            
            # Step 3: Masak Kernel & DTB
            # Kita tambah perintah 'dtbs' di sini biar file .dtb nya muncul
            make -j$(nproc --all) O=out \
                ARCH=arm64 \
                CC=clang \
                CLANG_TRIPLE=aarch64-linux-gnu- \
                CROSS_COMPILE=aarch64-linux-gnu- \
                CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                Image.gz dtbs

            # Step 4: Gabungin Jadi Image.gz-dtb
            # Pakai perintah find biar lebih akurat nyari file dtb-nya
            find out/arch/arm64/boot/dts/qcom/ -name "*.dtb" -exec cat {} + > out/arch/arm64/boot/Image.gz-dtb
      - store_artifacts:
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
          destination: hasil-kernel-pure-wildan
workflows:
  build_ksu:
    jobs:
      - masak_ksu_next
