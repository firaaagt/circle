version: 2.1
jobs:
  test_kernel:
    docker:
      - image: ghcr.io/stebomuraya/docker-android-build-env:latest
    resource_class: large
    steps:
      - run:
          name: Setup
          command: |
            sudo apt-get update
            sudo apt-get install -y bc bison build-essential flex git libssl-dev libelf-dev clang lld
            pwd
            clang --version
            gcc --version
            git clone --depth=1 https://github.com/Mi-Thorium/kernel_msm-4.19.git -b mithorium/a13/tmp/4.19.307 kernel
            cd kernel
            ls -la
      - run:
          name: Build
          command: |
            cd kernel
            export ARCH=arm64
            export SUBARCH=arm64
            export KBUILD_BUILD_USER="Wildan"
            export KBUILD_BUILD_HOST="Kaioxen-Lab"
            make O=out vendor/xiaomi/msm8937/mi8937.config
            make -j$(nproc --all) O=out \
                ARCH=arm64 \
                CC=clang \
                CLANG_TRIPLE=aarch64-linux-gnu- \
                CROSS_COMPILE=aarch64-linux-android- \
                CROSS_COMPILE_ARM32=arm-linux-androideabi-
      - store_artifacts:
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
          destination: kernel-test-wildan
workflows:
  build_test:
    jobs:
      - test_kernel
